services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ib-gateway
    restart: unless-stopped
    environment:
      - TWS_USERID=${IBKR_USERNAME}
      - TWS_PASSWORD=${IBKR_PASSWORD}
      - TRADING_MODE=paper
      - VNC_SERVER_PASSWORD=
      - TWOFA_TIMEOUT_ACTION=restart
      - READ_ONLY_API=no
    ports:
      - "4004:4004"
      - "5900:5900"
    healthcheck:
      test: ["CMD", "bash", "-lc", "nc -z 127.0.0.1 4004"]
      interval: 10s
      timeout: 5s
      retries: 30

  trader:
    build: .
    container_name: wc-trader
    restart: "no"
    depends_on:
      ib-gateway:
        condition: service_started
    env_file:
      - .env
    volumes:
      - wc_trader_state:/app/state
      - /home/brendon/openclaw/workspace/bin:/app/bin
      - /home/brendon/wc_trader/config:/app/config:ro
      - ./config:/app/config:ro
volumes:
  wc_trader_state:
