services:
ib-gateway:
image: ghcr.io/gnzsnz/ib-gateway:stable
container_name: ib-gateway
restart: unless-stopped
environment:
- TWS_USERID=${IBKR_USERNAME}
- TWS_PASSWORD=${IBKR_PASSWORD}
- TRADING_MODE=paper
- VNC_SERVER_PASSWORD=
- TWOFA_TIMEOUT_ACTION=restart
ports:
- "4002:4002"
- "5900:5900"
healthcheck:
test: ["CMD", "bash", "-lc", "nc -z 127.0.0.1 4002"]
interval: 10s
timeout: 5s
retries: 30

trader:
build: .
container_name: wc-trader
restart: unless-stopped
depends_on:
ib-gateway:
condition: service_healthy
env_file:
- .env
volumes:
- wc_trader_state:/app/state

volumes:
wc_trader_state:
